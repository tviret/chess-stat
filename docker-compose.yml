services:
  mysql:
    image: mysql:8.0
    container_name: chess_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chess_api
      MYSQL_USER: chess_user
      MYSQL_PASSWORD: chess_pass
    ports:
      - "3307:3306"
    volumes:
      - chess_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chess_data: